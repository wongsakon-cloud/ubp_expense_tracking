<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Tags สำหรับการแชร์ลงโซเชียลมีเดีย (LINE, Facebook, Twitter) บนมือถือและคอมพิวเตอร์ -->
    <meta property="og:title" content="UBP Expense Tracking - ระบบบันทึกค่าใช้จ่าย">
    <meta property="og:description" content="ระบบจัดการข้อมูลการเงิน บัญชี และติดตามค่าใช้จ่าย UBP">
    <meta property="og:image" content="https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?q=80&w=600&auto=format&fit=crop">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="UBP Expense Tracking - ระบบบันทึกค่าใช้จ่าย">
    <meta name="twitter:description" content="ระบบจัดการข้อมูลการเงิน บัญชี และติดตามค่าใช้จ่าย UBP">
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?q=80&w=600&auto=format&fit=crop">

    <title>UBP Expense Tracking | ระบบการเงินและบัญชี</title>

    <!-- Tailwind CSS สำหรับการจัดเลย์เอาต์ที่รวดเร็วและตอบสนองทุกหน้าจอ -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ฟอนต์ภาษาไทย Sarabun เพื่อความสวยงามและเป็นทางการ -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-slate-50">

    <!-- ส่วนหัวระบบ (Header) พร้อมโลโก้การเงินและบัญชี -->
    <header class="bg-white border-b border-slate-200 shadow-sm z-10 px-4 py-3 md:px-6 flex items-center justify-between">
        <div class="flex items-center space-x-3 md:space-x-4">
            <!-- โลโก้การเงินและบัญชีแบบโมเดิร์น (สัญลักษณ์กราฟแท่งและการเติบโตทางการเงิน) -->
            <div class="flex items-center justify-center w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-tr from-indigo-600 to-blue-500 text-white shadow-md shadow-indigo-100 shrink-0">
                <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"></path>
                </svg>
            </div>
            <div>
                <!-- ชื่อแอปพลิเคชัน ปรับขนาดตามหน้าจอโดยอัตโนมัติ -->
                <h1 class="text-base md:text-lg lg:text-xl font-bold text-slate-800 tracking-tight leading-tight">
                    UBP Expense Tracking
                </h1>
                <p class="text-[10px] md:text-xs text-slate-500 font-medium">
                    ระบบบันทึกและติดตามข้อมูลการเงิน
                </p>
            </div>
        </div>

        <!-- ฝั่งขวา: สถานะการทำงานและแผนก -->
        <div class="flex items-center space-x-2">
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">
                <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                ออนไลน์
            </span>
            <span class="hidden sm:inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-semibold bg-indigo-50 text-indigo-700 border border-indigo-100">
                การเงินและบัญชี
            </span>
        </div>
    </header>

    <!-- พื้นที่แสดงผลสำหรับดึงข้อมูลผ่าน iFrame -->
    <main class="flex-1 w-full h-full relative bg-slate-100">
        <!-- หน้าจอ Loading แสดงระหว่างรอเว็บแอปพลิเคชันจาก Google Script โหลดเสร็จ -->
        <div id="loading-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-20 transition-opacity duration-300">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-600 mb-3"></div>
            <p class="text-xs font-medium text-slate-500 animate-pulse">กำลังเรียกข้อมูลระบบการเงิน...</p>
        </div>

        <!-- iFrame ดึงข้อมูลระบบ UBP -->
        <iframe 
            id="app-iframe"
            src="https://script.google.com/macros/s/AKfycbw4Oyc7pOImJNyResNpiM0Z5t742Ka2QW3Fvd50WjqHi89lJzq7NbjHMgE424gskH_P/exec"
            class="w-full h-full border-none"
            onload="hideLoading()">
        </iframe>
    </main>

    <script>
        // ฟังก์ชันช่วยซ่อน Loading Screen เมื่อข้อมูลใน iFrame โหลดเสร็จสมบูรณ์
        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                }, 300);
            }
        }
    </script>
</body>
</html>
